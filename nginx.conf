server {
    listen 80;

    # Proxy all /api/* requests to the backend container.
    # Pass X-Forwarded-Proto from Traefik (https) rather than overwriting
    # with $scheme (http), so better-auth issues Secure session cookies.
    location /api/ {
        proxy_pass http://server:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Photo files are stored on the server container and served by Hono.
    location /uploads/ {
        proxy_pass http://server:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Serve the SPA — all unknown paths fall back to index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

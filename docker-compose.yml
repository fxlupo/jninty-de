services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        JNINTY_REF: main
    environment:
      PORT: "3001"
      BETTER_AUTH_SECRET: "<change-me-to-a-random-64-char-string>"
      BETTER_AUTH_URL: "https://<your-tld>"
      FRONTEND_ORIGIN: "https://<your-tld>"
      TRUSTED_ORIGINS: "https://<your-tld>"
      IRRIGATION_ENABLED: "${IRRIGATION_ENABLED:-false}"
      IRRIGATION_DEVICE_TOKEN: "${IRRIGATION_DEVICE_TOKEN:-}"
      IRRIGATION_DEVICE_USER_ID: "${IRRIGATION_DEVICE_USER_ID:-}"
      IRRIGATION_MQTT_ENABLED: "${IRRIGATION_MQTT_ENABLED:-false}"
      IRRIGATION_MQTT_URL: "${IRRIGATION_MQTT_URL:-mqtt://localhost:1883}"
      IRRIGATION_MQTT_USERNAME: "${IRRIGATION_MQTT_USERNAME:-}"
      IRRIGATION_MQTT_PASSWORD: "${IRRIGATION_MQTT_PASSWORD:-}"
      IRRIGATION_MQTT_DEVICE_ID: "${IRRIGATION_MQTT_DEVICE_ID:-esp32-01}"
      IRRIGATION_MQTT_TOPIC_PREFIX: "${IRRIGATION_MQTT_TOPIC_PREFIX:-irrigation}"
    volumes:
      - jninty_data:/app/data
    networks:
      - proxy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JNINTY_REF: main
    networks:
      - proxy
    depends_on:
      - server
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy

      - traefik.http.routers.jninty.rule=Host(`<your-domain>`)
      - traefik.http.routers.jninty.entrypoints=https
      - traefik.http.routers.jninty.tls=true
      - traefik.http.routers.jninty.tls.certresolver=http
      - traefik.http.routers.jninty.priority=10
      - traefik.http.routers.jninty.middlewares=secHeaders@file

      - traefik.http.services.jninty.loadbalancer.server.port=80

networks:
  proxy:
    external: true

volumes:
  jninty_data:
